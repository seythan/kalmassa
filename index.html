<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер Автозапчастей</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 15px; }
        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #21262d;
            margin-bottom: 20px;
        }
        h1 { color: #58a6ff; font-size: 2em; margin-bottom: 8px; }
        .subtitle { color: #8b949e; font-size: 1em; }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            overflow-x: auto;
        }
        .tab {
            padding: 10px 16px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            color: #c9d1d9;
            font-size: 14px;
            white-space: nowrap;
        }
        .tab:hover { background: #1f2937; border-color: #58a6ff; }
        .tab.active { background: #1f6feb; border-color: #58a6ff; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .search-box {
            width: 100%;
            padding: 12px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .search-box:focus { outline: none; border-color: #58a6ff; }
        .category {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .category-header {
            padding: 12px 16px;
            background: #1f2937;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-header:hover { background: #273549; }
        .category-title { font-size: 1.1em; font-weight: 600; color: #58a6ff; }
        .category-count {
            background: #30363d;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
        }
        .category-content { display: none; padding: 12px; }
        .category-content.open { display: block; }
        .subcategory { margin-bottom: 12px; }
        .subcategory-title {
            color: #8b949e;
            font-weight: 600;
            margin-bottom: 8px;
            padding-left: 8px;
            border-left: 3px solid #58a6ff;
        }
        .item {
            padding: 10px 12px;
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .item:hover {
            background: #1f2937;
            border-color: #58a6ff;
            transform: translateX(5px);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 15px;
            overflow-y: auto;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 25px;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #8b949e;
            font-size: 28px;
            cursor: pointer;
            width: 36px;
            height: 36px;
        }
        .modal-close:hover { color: #58a6ff; background: #21262d; }
        .modal-image {
            width: 100%;
            height: 300px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 18px;
            background: #0d1117;
            border: 1px solid #30363d;
        }
        .modal-title { color: #58a6ff; font-size: 1.5em; margin-bottom: 12px; }
        .modal-info {
            margin-bottom: 12px;
            padding: 12px;
            background: #0d1117;
            border-radius: 6px;
            border-left: 3px solid #58a6ff;
        }
        .modal-info-label { color: #8b949e; font-weight: 600; margin-bottom: 4px; font-size: 0.9em; }
        .modal-info-value { color: #c9d1d9; font-size: 1em; line-height: 1.4; }
        .quiz-container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
        }
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .quiz-progress { color: #8b949e; font-size: 0.9em; }
        .quiz-score { color: #58a6ff; font-weight: 600; }
        .quiz-item-name {
            font-size: 1.8em;
            color: #ffffff;
            margin-bottom: 15px;
            text-align: center;
            padding: 20px;
            background: #0d1117;
            border: 2px solid #30363d;
            border-radius: 8px;
            font-weight: 700;
        }
        .show-details-btn {
            width: 100%;
            background: #21262d;
            border: 1px solid #30363d;
            color: #58a6ff;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 1em;
            font-weight: 600;
        }
        .show-details-btn:hover { background: #30363d; border-color: #58a6ff; }
        .quiz-item-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .quiz-item-image {
            width: 100%;
            height: 250px;
            object-fit: contain;
            border-radius: 6px;
            margin-bottom: 12px;
            background: #0d1117;
        }
        .quiz-item-details { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .quiz-item-detail {
            background: #161b22;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #58a6ff;
        }
        .quiz-item-detail-label { color: #8b949e; font-size: 0.85em; margin-bottom: 4px; font-weight: 600; }
        .quiz-item-detail-value { color: #c9d1d9; font-weight: 500; font-size: 0.95em; line-height: 1.4; }
        .quiz-question {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #c9d1d9;
            text-align: center;
        }
        .quiz-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }
        .quiz-option {
            padding: 16px;
            background: #0d1117;
            border: 2px solid #30363d;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-size: 1em;
        }
        .quiz-option:hover { background: #1f2937; border-color: #58a6ff; }
        .quiz-option.correct { background: #1f6f3f; border-color: #2ea043; color: white; }
        .quiz-option.wrong { background: #6f1f1f; border-color: #da3633; color: white; }
        .quiz-option.disabled { pointer-events: none; }
        .btn {
            padding: 12px 24px;
            background: #1f6feb;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { background: #388bfd; }
        .btn-secondary { background: #30363d; }
        .btn-secondary:hover { background: #484f58; }
        .category-select {
            padding: 10px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 16px;
            margin-bottom: 20px;
            width: 100%;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-value { font-size: 2em; color: #58a6ff; font-weight: 700; }
        .stat-label { color: #8b949e; margin-top: 8px; font-size: 0.9em; }
        .category-stats {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
        }
        .category-stat-item { margin-bottom: 16px; }
        .category-stat-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.9em;
        }
        .category-stat-name { color: #c9d1d9; font-weight: 600; }
        .category-stat-score { color: #58a6ff; }
        .progress-bar {
            height: 8px;
            background: #21262d;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1f6feb, #58a6ff);
            transition: width 0.5s;
        }
        .empty-state { text-align: center; padding: 40px 20px; color: #8b949e; }
        .empty-state-icon { font-size: 3em; margin-bottom: 16px; }
        @media (max-width: 768px) {
            .quiz-options { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .modal-image, .quiz-item-image { height: 200px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 Тренажер Автозапчастей</h1>
            <p class="subtitle">Изучайте каталог и тренируйтесь</p>
        </header>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('catalog')">📚 Каталог</button>
            <button class="tab" onclick="switchTab('quiz')">🎯 Тренажер</button>
            <button class="tab" onclick="switchTab('errors')">❌ Ошибки</button>
            <button class="tab" onclick="switchTab('stats')">📊 Статистика</button>
        </div>
        <div id="catalog" class="tab-content active">
            <input type="text" class="search-box" placeholder="🔍 Поиск..." oninput="searchItems(this.value)">
            <div id="catalog-list"></div>
        </div>
        <div id="quiz" class="tab-content">
            <div class="quiz-container">
                <select class="category-select" id="quiz-category" onchange="startQuiz()">
                    <option value="all">Все категории</option>
                </select>
                <div id="quiz-content"></div>
            </div>
        </div>
        <div id="errors" class="tab-content">
            <div class="quiz-container">
                <h2>❌ Работа над ошибками</h2>
                <button class="btn" onclick="startErrorQuiz()" style="margin: 10px 0;">Начать тренировку</button>
                <div id="error-quiz-content"></div>
            </div>
        </div>
        <div id="stats" class="tab-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-questions">0</div>
                    <div class="stat-label">Всего вопросов</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="correct-answers">0</div>
                    <div class="stat-label">Правильных</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="accuracy">0%</div>
                    <div class="stat-label">Точность</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="error-count">0</div>
                    <div class="stat-label">Ошибок</div>
                </div>
            </div>
            <div class="category-stats">
                <h3 style="margin-bottom: 20px; color: #58a6ff;">Статистика по категориям</h3>
                <div id="category-stats-list"></div>
            </div>
        </div>
    </div>
    <div class="modal" id="item-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <img class="modal-image" id="modal-image" src="" alt="">
            <h2 class="modal-title" id="modal-title"></h2>
            <div class="modal-info">
                <div class="modal-info-label">Назначение:</div>
                <div class="modal-info-value" id="modal-purpose"></div>
            </div>
            <div class="modal-info">
                <div class="modal-info-label">Расположение:</div>
                <div class="modal-info-value" id="modal-location"></div>
            </div>
            <div class="modal-info">
                <div class="modal-info-label">Категория:</div>
                <div class="modal-info-value" id="modal-category"></div>
            </div>
            <div class="modal-info">
                <div class="modal-info-label">Подкатегория:</div>
                <div class="modal-info-value" id="modal-subcategory"></div>
            </div>
        </div>
    </div>

        let currentQuiz = [];
        let currentQuestionIndex = 0;
        let quizScore = 0;

        function loadStats() {
            const stats = localStorage.getItem('autoTrainerStats');
            return stats ? JSON.parse(stats) : { totalQuestions: 0, correctAnswers: 0, errors: [], categoryStats: {} };
        }

        function saveStats(stats) {
            localStorage.setItem('autoTrainerStats', JSON.stringify(stats));
        }

        function init() {
            renderCatalog();
            populateCategorySelect();
            updateStats();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
            if (tabName === 'stats') updateStats();
            else if (tabName === 'errors') renderErrorQuiz();
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function renderCatalog(filter = '') {
            const catalogList = document.getElementById('catalog-list');
            const grouped = {};
            catalogData.forEach(item => {
                if (filter && !item.item.toLowerCase().includes(filter.toLowerCase())) return;
                if (!grouped[item.main]) grouped[item.main] = {};
                if (!grouped[item.main][item.sub]) grouped[item.main][item.sub] = [];
                grouped[item.main][item.sub].push(item);
            });
            let html = '';
            for (const mainCat in grouped) {
                const subcats = grouped[mainCat];
                const totalItems = Object.values(subcats).reduce((sum, arr) => sum + arr.length, 0);
                html += `<div class="category"><div class="category-header" onclick="toggleCategory(this)"><span class="category-title">${mainCat}</span><span class="category-count">${totalItems} дет.</span></div><div class="category-content">`;
                for (const subCat in subcats) {
                    html += `<div class="subcategory"><div class="subcategory-title">${subCat}</div>`;
                    subcats[subCat].forEach(item => {
                        html += `<div class="item" onclick="showItemModal('${escapeHtml(item.item)}')">${item.item}</div>`;
                    });
                    html += `</div>`;
                }
                html += `</div></div>`;
            }
            catalogList.innerHTML = html || '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>Ничего не найдено</p></div>';
        }

        function searchItems(query) { renderCatalog(query); }
        function toggleCategory(element) { element.nextElementSibling.classList.toggle('open'); }

        function showItemModal(itemName) {
            const item = catalogData.find(i => i.item === itemName);
            if (!item) return;
            document.getElementById('modal-title').textContent = item.item;
            document.getElementById('modal-purpose').textContent = item.purpose;
            document.getElementById('modal-location').textContent = item.location;
            document.getElementById('modal-category').textContent = item.main;
            document.getElementById('modal-subcategory').textContent = item.sub;
            document.getElementById('modal-image').src = item.img;
            document.getElementById('item-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('item-modal').classList.remove('active'); }

        function populateCategorySelect() {
            const select = document.getElementById('quiz-category');
            const categories = [...new Set(catalogData.map(item => item.main))];
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });
        }

        function startQuiz() {
            const selectedCategory = document.getElementById('quiz-category').value;
            let items = selectedCategory === 'all' ? [...catalogData] : catalogData.filter(item => item.main === selectedCategory);
            currentQuiz = shuffleArray(items).slice(0, 20).map(item => ({ item, options: generateOptions(item) }));
            currentQuestionIndex = 0;
            quizScore = 0;
            renderQuizQuestion();
        }

        function generateOptions(correctItem) {
            const sameCategoryItems = catalogData.filter(i => i.main === correctItem.main);
            const subcategories = [...new Set(sameCategoryItems.map(i => i.sub))];
            const wrongOptions = subcategories.filter(s => s !== correctItem.sub);
            const shuffled = shuffleArray(wrongOptions).slice(0, 3);
            shuffled.push(correctItem.sub);
            return shuffleArray(shuffled);
        }

        function renderQuizQuestion() {
            const container = document.getElementById('quiz-content');
            if (currentQuestionIndex >= currentQuiz.length) {
                container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🎉</div><h2>Завершен!</h2><p style="margin: 20px 0; font-size: 1.2em;">Правильно: ${quizScore} из ${currentQuiz.length}</p><p style="margin-bottom: 20px;">Точность: ${Math.round((quizScore / currentQuiz.length) * 100)}%</p><button class="btn" onclick="startQuiz()">Еще раз</button></div>`;
                return;
            }
            const q = currentQuiz[currentQuestionIndex];
            container.innerHTML = `<div class="quiz-header"><div class="quiz-progress">Вопрос ${currentQuestionIndex + 1} из ${currentQuiz.length}</div><div class="quiz-score">Правильно: ${quizScore}</div></div><div class="quiz-item-name">🔧 ${q.item.item}</div><button class="show-details-btn" onclick="toggleQuizDetails()">ℹ️ Показать информацию</button><div id="quiz-details" style="display: none;"><div class="quiz-item-card"><img class="quiz-item-image" src="${q.item.img}" alt="${q.item.item}" onerror="this.src='https://via.placeholder.com/600x400/30363d/c9d1d9?text=Нет+фото'"><div class="quiz-item-details"><div class="quiz-item-detail"><div class="quiz-item-detail-label">Назначение:</div><div class="quiz-item-detail-value">${q.item.purpose}</div></div><div class="quiz-item-detail"><div class="quiz-item-detail-label">Расположение:</div><div class="quiz-item-detail-value">${q.item.location}</div></div><div class="quiz-item-detail"><div class="quiz-item-detail-label">Категория:</div><div class="quiz-item-detail-value">${q.item.main}</div></div><div class="quiz-item-detail"><div class="quiz-item-detail-label">Подкатегория:</div><div class="quiz-item-detail-value" style="color: #58a6ff; font-weight: bold;">${q.item.sub}</div></div></div></div></div><div class="quiz-question">В какой подкатегории находится?</div><div class="quiz-options">${q.options.map((opt, i) => `<div class="quiz-option" onclick="selectAnswer(${i})">${opt}</div>`).join('')}</div>`;
        }

        function toggleQuizDetails() {
            const details = document.getElementById('quiz-details');
            const btn = document.querySelector('.show-details-btn');
            if (details.style.display === 'none') {
                details.style.display = 'block';
                btn.innerHTML = '🙈 Скрыть';
            } else {
                details.style.display = 'none';
                btn.innerHTML = 'ℹ️ Показать информацию';
            }
        }

        function selectAnswer(index) {
            const q = currentQuiz[currentQuestionIndex];
            const isCorrect = q.options[index] === q.item.sub;
            const options = document.querySelectorAll('.quiz-option');
            options.forEach((opt, i) => {
                opt.classList.add('disabled');
                if (q.options[i] === q.item.sub) opt.classList.add('correct');
                else if (i === index && !isCorrect) opt.classList.add('wrong');
            });
            const stats = loadStats();
            stats.totalQuestions++;
            if (isCorrect) { quizScore++; stats.correctAnswers++; }
            else {
                const errorKey = `${q.item.item}|${q.item.sub}|${q.item.main}`;
                if (!stats.errors.includes(errorKey)) stats.errors.push(errorKey);
            }
            if (!stats.categoryStats[q.item.main]) stats.categoryStats[q.item.main] = { total: 0, correct: 0 };
            stats.categoryStats[q.item.main].total++;
            if (isCorrect) stats.categoryStats[q.item.main].correct++;
            saveStats(stats);
            setTimeout(() => { currentQuestionIndex++; renderQuizQuestion(); }, 1500);
        }

        function renderErrorQuiz() {
            const container = document.getElementById('error-quiz-content');
            const stats = loadStats();
            if (stats.errors.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">✅</div><h2>Ошибок нет!</h2></div>`;
                return;
            }
            container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📝</div><h2>Ошибки</h2><p style="margin: 20px 0;">${stats.errors.length} ${getPlural(stats.errors.length, 'ошибка', 'ошибки', 'ошибок')}</p><button class="btn" onclick="startErrorQuiz()">Тренировка</button><button class="btn btn-secondary" onclick="clearErrors()" style="margin-top: 10px;">Очистить</button></div>`;
        }

        function startErrorQuiz() {
            const stats = loadStats();
            if (stats.errors.length === 0) return alert('Нет ошибок!');
            currentQuiz = stats.errors.map(errStr => {
                const [itemName, sub, main] = errStr.split('|');
                const item = catalogData.find(i => i.item === itemName) || { item: itemName, sub, main, purpose: 'Нет данных', location: 'Нет данных', img: '' };
                return { item, options: generateOptions(item) };
            });
            currentQuiz = shuffleArray(currentQuiz).slice(0, 20);
            currentQuestionIndex = 0;
            quizScore = 0;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('quiz').classList.add('active');
            renderQuizQuestion();
        }

        function clearErrors() {
            if (confirm('Очистить ошибки?')) {
                const stats = loadStats();
                stats.errors = [];
                saveStats(stats);
                renderErrorQuiz();
            }
        }

        function updateStats() {
            const stats = loadStats();
            document.getElementById('total-questions').textContent = stats.totalQuestions;
            document.getElementById('correct-answers').textContent = stats.correctAnswers;
            document.getElementById('accuracy').textContent = stats.totalQuestions > 0 ? Math.round((stats.correctAnswers / stats.totalQuestions) * 100) + '%' : '0%';
            document.getElementById('error-count').textContent = stats.errors.length;
            const list = document.getElementById('category-stats-list');
            const categories = [...new Set(catalogData.map(item => item.main))];
            let html = '';
            categories.forEach(cat => {
                const s = stats.categoryStats[cat] || { total: 0, correct: 0 };
                const acc = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0;
                html += `<div class="category-stat-item"><div class="category-stat-header"><span class="category-stat-name">${cat}</span><span class="category-stat-score">${s.correct}/${s.total} (${acc}%)</span></div><div class="progress-bar"><div class="progress-fill" style="width: ${acc}%"></div></div></div>`;
            });
            list.innerHTML = html;
        }

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getPlural(n, one, few, many) {
            const mod10 = n % 10, mod100 = n % 100;
            if (mod10 === 1 && mod100 !== 11) return one;
            if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return few;
            return many;
        }

        window.onclick = function(event) {
            if (event.target === document.getElementById('item-modal')) closeModal();
        }

        init();
    </script>
</body>
</html>
